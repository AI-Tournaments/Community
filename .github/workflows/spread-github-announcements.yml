name: spread-github-announcements
on:
  discussion:
    types: [created]
jobs:
  spread:
    runs-on: ubuntu-latest
    steps:
      - name: CompileMessage
        uses: actions/github-script@v6
        with:
          result-encoding: string
          script: return 'test'
            const discussion = context.payload.discussion
            const isAnnouncement = discussion.category.node_id === 'DIC_kwDOF2FhEs4CQX_F'
            let announcement
            if(isAnnouncement){
              announcement = '['+discussion.title+']('+discussion.html_url+')'
            }
            console.log(announcement)
            if(announcement){
              return announcement
            }else{
              throw 'Invalid call'
            }
      - name: Get result (test)
        run: echo "${{steps.CompileMessage.outputs.result}}"
      - name: SpreadMessage
        uses: fjogeleit/http-request-action@v1
        with:
          url: '${{ secrets.DISCORD_ANNOUNCEMENTWEBHOOK }}'
          method: 'POST'
          customHeaders: '{"Content-Type": "application/json"}'
          data: '{"content": "${{steps.CompileMessage.outputs.result}}"}'
